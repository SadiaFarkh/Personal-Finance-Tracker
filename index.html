<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Metadata -->
    <title>Aura Finance | Personal Finance Tracker & Wealth Dashboard</title>
    <meta name="description" content="Aura Finance is a professional-grade portfolio tracker. Track transactions, analyze income and expenses, set monthly category budgets, and follow savings goals with real-time visual analytics." />
    
    <!-- Inline script to prevent theme flashing on load -->
    <script>
      (function() {
        const theme = localStorage.getItem('finance_theme_v2') || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.colorScheme = 'light';
        }
      })();
    </script>
    
    <!-- Theme & App Color -->
    <meta name="theme-color" content="#09090b" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
